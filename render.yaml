# Render Blueprint for VANTA OS
# This file defines all services needed to run VANTA OS on Render.
# Usage: Go to https://dashboard.render.com/select-repo and select this repo.
# Render will automatically detect this file and create all services.

databases:
  - name: vanta-os-db
    databaseName: vanta_os
    ipAllowList: []
    plan: free

  - name: vanta-os-redis
    type: redis
    ipAllowList: []
    plan: free
    maxmemoryPolicy: allkeys-lru

services:
  # Web Service — serves the Remix app
  - type: web
    name: vanta-os
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vanta-os-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: vanta-os-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: vanta-os-redis
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_APP_HANDLE
        value: vanta-os
      - key: SHOPIFY_API_VERSION
        value: "2025-04"
      - key: SHOPIFY_APP_SCOPES
        value: "read_products,write_products,read_inventory,write_inventory,read_locations,read_collections,write_collections,read_metafields,write_metafields,read_themes,read_orders,read_customers,read_price_rules,read_discounts,read_shop_locales,read_markets"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: VAULT_SALT
        sync: false
      - key: INTERNAL_DOCS_SECRET
        sync: false
      - key: AGENCY_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: WHITELABEL_MODE
        value: "false"
    healthCheckPath: /health
    autoDeploy: true

  # Background Worker — processes BullMQ jobs (CRITICAL)
  - type: worker
    name: vanta-os-worker
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vanta-os-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: vanta-os-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: vanta-os-redis
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_APP_HANDLE
        value: vanta-os
      - key: SHOPIFY_API_VERSION
        value: "2025-04"
      - key: SHOPIFY_APP_SCOPES
        value: "read_products,write_products,read_inventory,write_inventory,read_locations,read_collections,write_collections,read_metafields,write_metafields,read_themes,read_orders,read_customers,read_price_rules,read_discounts,read_shop_locales,read_markets"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_SALT
        sync: false
      - key: VAULT_SALT
        sync: false
      - key: INTERNAL_DOCS_SECRET
        sync: false
      - key: AGENCY_SECRET
        sync: false
      - key: WHITELABEL_MODE
        value: "false"
    autoDeploy: true
