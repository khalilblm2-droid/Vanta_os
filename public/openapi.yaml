openapi: 3.0.3
info:
  title: VANTA OS API
  version: 1.0.0
  description: |
    Internal API for VANTA OS — the Shopify Embedded AI Agent App.
    All endpoints require Shopify App Bridge session token authentication.
  contact:
    name: VANTA OS Support
    email: support@vanta-os.example.com

servers:
  - url: https://vanta-os.example.com
    description: Production
  - url: http://localhost:3000
    description: Local development

components:
  securitySchemes:
    SessionToken:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer <session-token> from App Bridge"

security:
  - SessionToken: []

paths:
  /api/tasks:
    get:
      summary: List recent tasks
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 100 }
        - name: status
          in: query
          schema: { type: string, enum: [QUEUED, THINKING, EXECUTING, AWAITING_APPROVAL, COMPLETED, ERROR, CANCELLED, REVERTED] }
      responses:
        "200":
          description: List of tasks
    post:
      summary: Create + enqueue a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  maxLength: 2000
                priority:
                  type: string
                  enum: [LOW, NORMAL, HIGH, URGENT]
                  default: NORMAL
                language:
                  type: string
                  enum: [en, ar, fr]
                  default: en
                threadParentId:
                  type: string
                csvAttachmentUrl:
                  type: string
                  format: uri
                isRecurring:
                  type: boolean
                recurringCron:
                  type: string
      responses:
        "201": { description: Task created }
        "400": { description: Validation failed }
        "403": { description: Kill switch enabled }
        "409": { description: Duplicate task }
        "429": { description: Rate limited }

  /api/tasks/{taskId}:
    get:
      summary: Get a single task (polled every 2-3s by frontend)
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Task detail }
        "404": { description: Not found }

  /api/tasks/{taskId}/approve:
    post:
      summary: Approve or reject a task in AWAITING_APPROVAL state
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                approved: { type: boolean }
                modifications: { type: string }
      responses:
        "200": { description: Approved }
        "409": { description: Not awaiting approval }

  /api/tasks/{taskId}/undo:
    post:
      summary: Undo a completed task by replaying UndoSnapshots
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Undo result }
        "409": { description: Task not in COMPLETED state }

  /api/tasks/{taskId}/diff:
    get:
      summary: Get visual diff + logs for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Diffs and logs }

  /api/command-history:
    get:
      summary: Get last 20 commands (↑ arrow recall)
      responses:
        "200": { description: Command list }
    post:
      summary: Push a command to history
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                command: { type: string, maxLength: 2000 }
      responses:
        "200": { description: OK }

  /api/notifications:
    get:
      summary: List notifications for shop
      responses:
        "200": { description: Notification list }

  /api/notifications/{id}/read:
    post:
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/notifications/mark-all-read:
    post:
      summary: Mark all notifications as read
      responses:
        "200": { description: OK }

  /api/settings:
    get:
      summary: Get shop settings
      responses:
        "200": { description: Settings object }
    patch:
      summary: Update shop settings
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200": { description: OK }

  /api/billing:
    get:
      summary: Get current plan + credit usage
      responses:
        "200": { description: Subscription state }

  /api/feature-flags:
    get:
      summary: List feature flags for shop
      responses:
        "200": { description: Flag list }
    post:
      summary: Toggle a feature flag
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                key: { type: string }
                enabled: { type: boolean }
      responses:
        "200": { description: OK }

  /api/recurring-missions:
    get:
      summary: List recurring missions
      responses:
        "200": { description: Mission list }
    post:
      summary: Create a recurring mission
      responses:
        "201": { description: Created }

  /api/recurring-missions/{id}:
    delete:
      summary: Delete a recurring mission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/feedback:
    post:
      summary: Submit feedback (1-5 stars)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                message: { type: string }
      responses:
        "201": { description: Created }

  /api/audit-log:
    get:
      summary: Get permission audit log (Section 62)
      responses:
        "200": { description: Audit log entries }

  /api/rate-limit:
    get:
      summary: Get current Shopify API rate limit consumption (Section 53)
      responses:
        "200": { description: Rate limit status }

  /health:
    get:
      summary: Liveness probe (Section 40)
      security: []
      responses:
        "200": { description: OK }
        "503": { description: Degraded }
